<!DOCTYPE html>
<html>
<head>
<title>Mark Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fdf6ff, #f0f9ff);
    padding: 20px;
}

/* input card */
.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* student card */
.student {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin: 10px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* buttons */
button {
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.present { background: #86efac; }
.absent { background: #fca5a5; }
</style>
</head>

<body>

<h1>📋 Mark Attendance</h1>

<div class="card">
    <input id="name" type="text" placeholder="Name">
    <input id="roll" type="number" placeholder="Roll No">
    <button onclick="add()">Add</button>
</div>

<div id="list"></div>

<script src="attendance.js"></script>

</body>
</html>
