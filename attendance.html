<!DOCTYPE html>
<html>
<head> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fdf6ff, #f0f9ff);
    padding: 20px;
}

/* Header */
h1 {
    margin-bottom: 20px;
}

/* Add student */
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* Student cards */
.student {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin: 10px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.student:hover {
    transform: scale(1.02);
}

/* Buttons */
.actions button {
    padding: 6px 12px;
    border-radius: 10px;
    border: none;
    margin: 5px;
    cursor: pointer;
}

.present { background: #86efac; }
.absent { background: #fca5a5; }

/* Progress */
.bar {
    height: 8px;
    background: #eee;
    border-radius: 10px;
    margin-top: 10px;
}

.fill {
    height: 100%;
    border-radius: 10px;
}

/* Colors */
.good { background: #22c55e; }
.bad { background: #ef4444; }
</style>
</head>

<body>

<h1>📋 Mark Attendance</h1>

<!-- Add student -->
<div class="card">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="roll" placeholder="Roll No">
    <button onclick="addStudent()">Add</button>
</div>

<!-- Student list -->
<div id="list"></div>

<script src="attendance.js"></script>

</body>
</html>
