<!DOCTYPE html>
<html>
<head>
<title>Report</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #fdf6ff;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* Student row */
.row {
    margin: 15px 0;
}

/* Progress bar */
.bar {
    height: 10px;
    border-radius: 10px;
    background: #eee;
    overflow: hidden;
}

.fill {
    height: 100%;
    border-radius: 10px;
}

/* Colors */
.good { background: #86efac; }
.bad { background: #f87171; }

h1 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h1>📊 Student Report</h1>

<div class="card" id="report"></div>

<script src="report.js"></script>

</body>
</html>
