<!DOCTYPE html>
<html>
<head>
<title>attendify.com</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --pink: #ffafcc;
    --purple: #cdb4db;
    --blue: #a2d2ff;
    --green: #bde0fe;
    --text: #333;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌸 Background (classroom aesthetic) */
body {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1588072432836-e10032774350") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Soft blur overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(6px);
    background: rgba(255,255,255,0.6);
}

/* ✨ Floating shapes */
.circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.4;
    animation: float 10s infinite alternate ease-in-out;
}

.circle1 {
    width: 200px;
    height: 200px;
    background: var(--pink);
    top: 10%;
    left: 10%;
}

.circle2 {
    width: 150px;
    height: 150px;
    background: var(--blue);
    bottom: 10%;
    right: 10%;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-30px); }
}

/* 💎 Card */
.login-card {
    width: 350px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    z-index: 1;
}

/* Title */
.login-card h2 {
    margin-bottom: 20px;
}

/* Inputs */
.input-box {
    position: relative;
    margin: 20px 0;
}

.input-box input {
    width: 100%;
    padding: 10px 35px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
}

/* Icons */
.input-box i {
    position: absolute;
    top: 12px;
    left: 10px;
    color: #aaa;
}

/* Toggle */
.toggle {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, var(--pink), var(--purple));
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(200,150,255,0.5);
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
}
</style>
</head>

<body>

<!-- Floating shapes -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- Card -->
<div class="login-card">
    <h2>📚 Attendify</h2>

    <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password">
        <span class="toggle" onclick="togglePass()">👁</span>
    </div>

    <button onclick="login()">Login ✨</button>

    <div class="footer">Smart Classroom Attendance</div>
</div>

<script>
function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === "admin" && p === "1234") {
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid Login");
    }
}

function togglePass() {
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
